{% set name = "mistral-common" %}
{% set version = "1.11.6" %}
{% set buildnum = 0 %}

package:
  name: {{ name|lower }}-packages
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mistral_common-{{ version }}.tar.gz
    sha256: 35ed428e0e886808f0c048adac56843ce77d6cee13c1b54a045ad8d11e77c756
  - url: https://raw.githubusercontent.com/mistralai/mistral-common/v{{ version }}/LICENCE
    sha256: 5ed6f79e77734b5a60740dd821af5ecac9a6f33709c860eea4e20fcb6cca7fcc
    fn: LICENSE

outputs:
  - name: mistral-common
    build:
      number: {{ buildnum }}
      script:
        - $PYTHON -m pip install . -vv --no-deps --no-build-isolation # [unix]
        - %PYTHON% -m pip install . -vv --no-deps --no-build-isolation # [win]
      skip: true  # [py<310]

    requirements:
      host:
        - pip
        - python
        - wheel
        # setuptools must be at least this version for compatibility with PEP639. The pyproject.toml
        # for mistral-common looks to be defined with this PEP in mind, so setuptools needs
        # to support it as well.
        # https://packaging.python.org/en/latest/guides/writing-pyproject-toml/#license-and-license-files
        - setuptools >=77.0.3
      run:
        - python
        - pydantic >=2.7,<3.0  # [py<314]
        - pydantic >=2.12,<3.0  # [py>=314]
        - jsonschema >=4.21.1
        - typing-extensions >=4.11.0
        - tiktoken >=0.7.0  # [py<314]
        - tiktoken >=0.12.0  # [py>=314]
        - pillow >=10.3.0
        - requests >=2.0.0
        # upstream pyproject.toml caps numpy at <2.4 for py<=3.12; py>=3.13 is unbounded
        - numpy >=1.25,<2.4  # [py<313]
        - numpy >=1.25       # [py>=313]
        - pydantic-extra-types >=2.10.5
        # pydantic-extra-types[pycountry]
        - pycountry >=23


    test:
      imports:
        - mistral_common
        - mistral_common.protocol
        - mistral_common.tokens
        - mistral_common.protocol.instruct
        - mistral_common.tokens.tokenizers
        - mistral_common.tokens.tokenizers.tekken
      commands:
        - pip check
      requires:
        - pip
  - name: mistral-common-opencv
    build:
      number: {{ buildnum }}
      skip: true # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - pin_subpackage("mistral-common", exact=True)
        - opencv-python-headless >=4.0.0
  - name: mistral-common-image
    build:
      number: {{ buildnum }}
      skip: true # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - pin_subpackage("mistral-common", exact=True)
        - opencv-python-headless >=4.0.0
  - name: mistral-common-sentencepiece
    build:
      number: {{ buildnum }}
      skip: true # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - pin_subpackage("mistral-common", exact=True)
        - sentencepiece >=0.2.0
  - name: mistral-common-soundfile
    build:
      number: {{ buildnum }}
      skip: true # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - pin_subpackage("mistral-common", exact=True)
        - soundfile >=0.12.1
  - name: mistral-common-audio
    build:
      number: {{ buildnum }}
      skip: true # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - pin_subpackage("mistral-common", exact=True)
        - soundfile >=0.12.1
        - soxr-python >=0.5.0
  - name: mistral-common-soxr
    build:
      number: {{ buildnum }}
      skip: true # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - pin_subpackage("mistral-common", exact=True)
        - soxr-python >=0.5.0
  - name: mistral-common-guidance
    build:
      number: {{ buildnum }}
      skip: true # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - pin_subpackage("mistral-common", exact=True)
        - llguidance >=1.3.0,<1.4.0
        - jinja2 >=3.1.0
  - name: mistral-common-hf-hub
    build:
      number: {{ buildnum }}
      skip: true # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - pin_subpackage("mistral-common", exact=True)
        - huggingface-hub >=1.0
  - name: mistral-common-server
    build:
      number: {{ buildnum }}
      skip: true # [py<310]
    requirements:
      host:
        - python
      run:
        - python
        - pin_subpackage("mistral-common", exact=True)
        - fastapi >=0.118.3
        - pydantic-settings >=2.9.1
        - click >=8.1.0
        - uvloop >=0.22.1  # [py>=314]

about:
  home: https://github.com/mistralai/mistral-common
  summary: Set of tools to help you work with Mistral models
  description: |
    Set of tools to help you work with Mistral models.
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  dev_url: https://github.com/mistralai/mistral-common
  doc_url: https://github.com/mistralai/mistral-common

extra:
  recipe-maintainers:
    - jeongseok-meta
